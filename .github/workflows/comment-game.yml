name: Documentation de game.c

on:
  push:
    paths:
      - ".github/workflows/comment-game.yml"

permissions:
  contents: write

jobs:
  commenter-game:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Ajouter les commentaires explicatifs
        shell: python
        run: |
          from pathlib import Path

          path = Path("game.c")
          text = path.read_text(encoding="utf-8")

          header = r'''/*
           * game.c
           *
           * Ce module assure le lien entre la logique du Tetris et son interface SDL.
           * Il prend en charge :
           *   - l'initialisation de SDL, SDL_ttf et SDL_mixer ;
           *   - la création et la destruction des ressources du jeu ;
           *   - l'affichage des différents écrans (menu, jeu, pause, game over) ;
           *   - la gestion des événements clavier ;
           *   - la descente automatique des Tetriminos ;
           *   - le déclenchement de la musique et des effets sonores.
           *
           * La logique propre au plateau et aux Tetriminos reste principalement
           * définie dans tetris.c et mino.c. Ce fichier joue donc le rôle de
           * contrôleur principal et de couche d'affichage du programme.
           */

          // Bibliothèques standard : allocation dynamique et entrées/sorties.
          '''
          text = text.replace("#include <stdlib.h>\n#include <stdio.h>", header + "#include <stdlib.h>\n#include <stdio.h>", 1)

          text = text.replace(
              '#include <SDL2/SDL_mixer.h>\n#include <SDL2/SDL.h>',
              '// Bibliothèques SDL utilisées pour le son, la fenêtre et le rendu.\n#include <SDL2/SDL_mixer.h>\n#include <SDL2/SDL.h>',
              1,
          )

          text = text.replace(
              '#include "game.h"\n#include "mino.h"\n#include "tetris.h"',
              '// En-têtes internes décrivant la structure Game, les blocs et le plateau.\n#include "game.h"\n#include "mino.h"\n#include "tetris.h"',
              1,
          )

          text = text.replace(
              '// -------------------------------------------------------------\n// Fonction interne pour initialiser la SDL et créer une fenêtre\n// -------------------------------------------------------------\nstatic int game_sdl_init(Game *g, int x, int y)',
              r'''/**
           * Initialise les sous-systèmes graphiques, textuels et audio du jeu.
           *
           * @param g Structure Game dans laquelle les ressources SDL sont stockées.
           * @param x Position horizontale initiale de la fenêtre à l'écran.
           * @param y Position verticale initiale de la fenêtre à l'écran.
           * @return 1 si toutes les initialisations réussissent, 0 sinon.
           *
           * Cette fonction est déclarée static car elle n'est utilisée que dans
           * ce fichier. Chaque erreur est affichée dans stderr afin de faciliter
           * le diagnostic d'un problème SDL, TTF ou audio.
           */
          static int game_sdl_init(Game *g, int x, int y)''',
              1,
          )

          text = text.replace(
              '    if (SDL_Init(SDL_INIT_VIDEO) != 0)',
              '    // Initialisation du sous-système vidéo de SDL.\n    if (SDL_Init(SDL_INIT_VIDEO) != 0)',
              1,
          )
          text = text.replace(
              '    if (TTF_Init() != 0)',
              '    // Initialisation de SDL_ttf pour pouvoir afficher du texte.\n    if (TTF_Init() != 0)',
              1,
          )
          text = text.replace(
              '    g->win = SDL_CreateWindow("Tetris", x, y, 500, 600, SDL_WINDOW_SHOWN);',
              '    // Création d’une fenêtre de 500 x 600 pixels.\n    g->win = SDL_CreateWindow("Tetris", x, y, 500, 600, SDL_WINDOW_SHOWN);',
              1,
          )
          text = text.replace(
              '    g->ren = SDL_CreateRenderer(g->win, -1, SDL_RENDERER_ACCELERATED | SDL_RENDERER_PRESENTVSYNC);',
              '    // Le rendu accéléré utilise la carte graphique ; la synchronisation\n    // verticale limite les déchirures d’image.\n    g->ren = SDL_CreateRenderer(g->win, -1, SDL_RENDERER_ACCELERATED | SDL_RENDERER_PRESENTVSYNC);',
              1,
          )
          text = text.replace(
              '    g->fontSmall = TTF_OpenFont("Tetris.ttf", 14);',
              '    // Chargement de deux tailles de la même police : une petite pour\n    // les informations et une grande pour les titres.\n    g->fontSmall = TTF_OpenFont("Tetris.ttf", 14);',
              1,
          )
          text = text.replace(
              '    if (Mix_OpenAudio(44100, MIX_DEFAULT_FORMAT, 2, 2048) < 0)',
              '    // Ouverture du périphérique audio : fréquence 44,1 kHz, stéréo,\n    // avec une mémoire tampon de 2048 échantillons.\n    if (Mix_OpenAudio(44100, MIX_DEFAULT_FORMAT, 2, 2048) < 0)',
              1,
          )

          text = text.replace(
              '// ----------------------------------------\n// Initialise une nouvelle instance du jeu\n// ----------------------------------------\nGame *game_new(int x, int y)',
              r'''/**
           * Crée et initialise une nouvelle instance complète du jeu.
           *
           * @param x Position horizontale de la fenêtre.
           * @param y Position verticale de la fenêtre.
           * @return Un pointeur vers la structure Game créée, ou NULL en cas d'échec.
           *
           * La fonction alloue d'abord la structure Game, initialise tous ses
           * pointeurs à NULL, crée l'environnement SDL et le plateau Tetris,
           * puis charge les différents sons. En cas d'erreur, game_del est appelée
           * pour libérer proprement toutes les ressources déjà créées.
           */
          Game *game_new(int x, int y)''',
              1,
          )
          text = text.replace(
              '    g->win = NULL;',
              '    // Initialisation défensive : game_del pourra tester chaque pointeur\n    // sans risquer de libérer une zone mémoire non initialisée.\n    g->win = NULL;',
              1,
          )
          text = text.replace(
              '    g->freq = SDL_GetPerformanceFrequency();',
              '    // Fréquence et compteur haute précision utilisés pour mesurer le\n    // temps écoulé entre deux descentes automatiques.\n    g->freq = SDL_GetPerformanceFrequency();',
              1,
          )
          text = text.replace(
              '    g->soundLineClear = Mix_LoadWAV("line.wav");',
              '    // Chargement des effets sonores et des musiques utilisés pendant\n    // les différentes étapes de la partie.\n    g->soundLineClear = Mix_LoadWAV("line.wav");',
              1,
          )

          text = text.replace(
              '// ----------------------------------------\n// Libère les ressources associées au jeu\n// ----------------------------------------\nvoid game_del(Game *g)',
              r'''/**
           * Libère toutes les ressources détenues par une instance de Game.
           *
           * @param g Instance à détruire. La fonction ne fait rien si g vaut NULL.
           *
           * Les ressources sont libérées selon leur type : plateau, polices,
           * renderer, fenêtre, effets sonores et musiques. Les sous-systèmes SDL
           * sont ensuite fermés avant la libération de la structure elle-même.
           */
          void game_del(Game *g)''',
              1,
          )

          text = text.replace(
              'void game_update(Game *g)\n{',
              r'''/**
           * Redessine entièrement l'écran en fonction de l'état courant du jeu.
           *
           * @param g Instance du jeu contenant le renderer et les données du Tetris.
           *
           * Le renderer est d'abord effacé. Un switch sélectionne ensuite l'écran
           * correspondant à STATE_MENU, STATE_PLAY, STATE_GAMEOVER ou STATE_PAUSE.
           * SDL_RenderPresent affiche finalement l'image complète à l'écran.
           */
          void game_update(Game *g)
          {''',
              1,
          )
          text = text.replace(
              '    SDL_SetRenderDrawColor(g->ren, 24, 24, 24, 255);',
              '    // Couleur de fond commune aux différents écrans du jeu.\n    SDL_SetRenderDrawColor(g->ren, 24, 24, 24, 255);',
              1,
          )
          text = text.replace(
              '        // Affichage de la matrice fixée',
              '        // Affichage de la matrice fixée : une valeur nulle représente\n        // une case vide ; les autres valeurs identifient la couleur du bloc.',
              1,
          )
          text = text.replace(
              '                    int row = g->tet->current_line + i;',
              '                    // Conversion des coordonnées locales du buffer 5 x 5\n                    // en coordonnées absolues dans le plateau 20 x 10.\n                    int row = g->tet->current_line + i;',
              1,
          )
          text = text.replace(
              '                    Color light = {',
              '                    // Les teintes claire et sombre donnent un effet de\n                    // relief aux blocs de la zone de prévisualisation.\n                    Color light = {',
              1,
          )

          text = text.replace(
              'void game_run(Game *g)\n{',
              r'''/**
           * Exécute la boucle principale du jeu jusqu'à la fermeture de la fenêtre.
           *
           * @param g Instance du jeu à exécuter.
           *
           * La boucle réalise trois opérations principales :
           *   1. traiter les événements SDL et les commandes du joueur ;
           *   2. faire descendre automatiquement la pièce selon le niveau ;
           *   3. redessiner l'écran avec game_update.
           */
          void game_run(Game *g)
          {''',
              1,
          )
          text = text.replace(
              '    while (running)\n    {',
              '    // La boucle se poursuit tant que le joueur ne ferme pas la fenêtre\n    // et n’appuie pas sur la touche Échap.\n    while (running)\n    {',
              1,
          )
          text = text.replace(
              '                int ret = tetris_move_down(g->tet);',
              '                // Convention de retour de tetris_move_down :\n                //   -1 : la nouvelle pièce ne peut pas apparaître, donc game over ;\n                //    0 : la pièce vient de se fixer sur le plateau ;\n                //    1 : la pièce a simplement été déplacée vers le bas.\n                int ret = tetris_move_down(g->tet);',
              1,
          )
          text = text.replace(
              '                last_time = current_time;',
              '                // Le compteur est réinitialisé après chaque tentative de\n                // descente afin de recommencer un nouvel intervalle de temps.\n                last_time = current_time;',
              1,
          )

          path.write_text(text, encoding="utf-8")

          # Le workflow est uniquement utilisé pour effectuer cette modification.
          # Il se supprime lui-même du dépôt après l'exécution.
          Path(".github/workflows/comment-game.yml").unlink()

      - name: Enregistrer la version commentée
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add game.c .github/workflows/comment-game.yml
          git commit -m "Ajout de commentaires explicatifs dans game.c"
          git push
